name: Build & Validate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build all services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore - RoomService
        run: dotnet restore RoomService/RoomService.csproj

      - name: Build - RoomService
        run: dotnet build RoomService/RoomService.csproj --no-restore -c Release

      - name: Restore - BookingService
        run: dotnet restore BookingService/BookingService.csproj

      - name: Build - BookingService
        run: dotnet build BookingService/BookingService.csproj --no-restore -c Release

      - name: Restore - UserService
        run: dotnet restore UserService/UserService.csproj

      - name: Build - UserService
        run: dotnet build UserService/UserService.csproj --no-restore -c Release

      - name: Restore - ApiGateway
        run: dotnet restore ApiGateway/ApiGateway.csproj

      - name: Build - ApiGateway
        run: dotnet build ApiGateway/ApiGateway.csproj --no-restore -c Release

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images via Compose
        run: docker compose build

      - name: Verify images built
        run: docker images | grep smartrooms
